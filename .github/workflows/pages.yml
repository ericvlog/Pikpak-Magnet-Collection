name: Deploy to GitHub Pages
on:
  push:
    branches: [master]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Delete old github-pages artifact
        run: |
          gh api /repos/${{ github.repository }}/actions/artifacts --jq '.artifacts[] | select(.name=="github-pages" and .expired==false) | .id' | while read id; do
            echo "deleting artifact $id"
            gh api -X DELETE /repos/${{ github.repository }}/actions/artifacts/$id
          done
        env:
          GH_TOKEN: ${{ github.token }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: page
      - id: deployment
        uses: actions/deploy-pages@v4
